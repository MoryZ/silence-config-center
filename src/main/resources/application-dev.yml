spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/silence-platform?allowPublicKeyRetrieval=true&useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false
    username: root
    password: 123456
    type: com.zaxxer.hikari.HikariDataSource
    hikari:
      connection-timeout: 30000
      minimum-idle: 10                   # 增加最小空闲连接
      maximum-pool-size: 100
      auto-commit: true
      idle-timeout: 600000               # 改为10分钟
      max-lifetime: 1200000              # 建议改为20分钟
      pool-name: silence_config_center_pool
      connection-test-query: SELECT 1    # MySQL连接测试语句
      validation-timeout: 5000           # 验证超时5秒
      leak-detection-threshold: 60000    # 泄漏检测60秒
      keepalive-time: 30000              # 保持连接30秒
  cloud:
    nacos:
      discovery:
        server-addr: localhost:8848
        username: nacos
        password: nacos
silence:
  auth:
    center:
      security:
        api:
          white-list: /api/v1/configItems/**,/api/v1/configItemReleaseHistories/release,/api/v1/client/**,/api/v1/configCyberarkInfos/pwd/getPassword